<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini MS Word ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> ✨ Mini MS Word 💖</h1>

    <div class="toolbar">
     <button id="plus">A➕</button>
    <button id="minus">A➖</button>
    <button id="bold"><b>B</b></button>
    <button id="underline"><u>U</u></button>
    <button id="italic"><i>I</i></button>

    <input type="color" id="color">

    <select name="font" id="font">
    <option value="Arial">Arial</option>
    <option value="Calibri">Calibri</option>
    <option value="Algerian">Algerian</option>
    <option value="AaSansOutline">AaSansOutline</option>
    <option value="Aatrix OCRB">Aatrix OCRB</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Cambria">Cambria</option>
    <option value="Verdana">Verdana</option>
    <option value="Georgia">Georgia</option>
    <option value="Courier New">Courier New</option>
      <option value="Tahoma">Tahoma</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Impact">Impact</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
    </select>

    <button id="clear">Clear</button>

    <button id="pdf">Save PDF</button>




    <button id="dark">Dark Mode</button>

    </div>

    <div class="editor" contenteditable="true">
<p id="para"> Type your text here...</p>
</div>
  
    <script src="app.js"></script>
    
</body>
</html>
